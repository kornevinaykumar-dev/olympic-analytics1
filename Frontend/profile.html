<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile | Olympic Analytics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head><body>
<div id="navbar"></div>
<main class="container py-4">
<h2 class="mb-4">My Profile</h2>
<div class="card p-4" id="profileCard">Loading…</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
requireAuth(); mountNav("profile.html");
(async()=>{
  try{
    const p = await api("/profile");
    document.getElementById("profileCard").innerHTML = `
      <div class="d-flex align-items-center gap-3 mb-3">
        <div style="width:64px;height:64px;border-radius:50%;background:#3b82f6;display:grid;place-items:center;font-size:1.6rem;font-weight:700">${p.name[0].toUpperCase()}</div>
        <div><div style="font-size:1.4rem;font-weight:700">${p.name}</div><div class="muted">${p.email}</div></div>
      </div>
      <div class="row g-3 mt-2">
        <div class="col-md-6"><div class="stat-card"><div class="label">Joined</div><div class="value" style="font-size:1.1rem">${new Date(p.created_at).toLocaleString()}</div></div></div>
        <div class="col-md-6"><div class="stat-card"><div class="label">Last Login</div><div class="value" style="font-size:1.1rem">${p.last_login? new Date(p.last_login).toLocaleString() : "—"}</div></div></div>
      </div>
      <button class="btn btn-outline-light mt-4" onclick="logout()">Logout</button>`;
  }catch(e){ toast(e.message,"error"); }
})();
</script></body></html>
