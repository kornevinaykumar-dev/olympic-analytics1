<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Analytics | Olympic Analytics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head><body>
<div id="navbar"></div>
<main class="container-fluid px-4 py-4">
<ul class="nav nav-tabs mb-3">
  <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#country-tab">Country</a></li>
  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#sport-tab">Sport</a></li>
</ul>
<div class="tab-content">
  <div id="country-tab" class="tab-pane active">
    <div class="card p-3 mb-3"><div class="row g-2 align-items-center">
      <div class="col-md-4"><select id="countrySel" class="form-select"></select></div>
      <div class="col-md-2"><button class="btn btn-primary w-100" id="loadCountry">Analyze</button></div>
    </div></div>
    <div class="row g-3" id="countryResult"></div>
  </div>
  <div id="sport-tab" class="tab-pane">
    <div class="card p-3 mb-3"><div class="row g-2 align-items-center">
      <div class="col-md-4"><select id="sportSel" class="form-select"></select></div>
      <div class="col-md-2"><button class="btn btn-primary w-100" id="loadSport">Analyze</button></div>
    </div></div>
    <div class="row g-3" id="sportResult"></div>
  </div>
</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script src="js/analytics.js"></script>
</body></html>
