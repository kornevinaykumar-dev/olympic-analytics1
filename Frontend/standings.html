<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Standings | Olympic Analytics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head><body>
<div id="navbar"></div>
<main class="container-fluid px-4 py-4">
<div class="d-flex flex-wrap align-items-center justify-content-between mb-3 gap-2">
  <h2 class="m-0">Medal Standings</h2>
  <div>
    <a class="btn btn-outline-light btn-sm" id="csvBtn">⬇ CSV</a>
    <a class="btn btn-outline-light btn-sm" id="pdfBtn">⬇ PDF</a>
  </div>
</div>
<div class="card p-3 mb-3"><div class="row g-2">
  <div class="col-md-3"><select class="form-select" id="year"><option value="">All years</option></select></div>
  <div class="col-md-3"><input class="form-control" id="country" placeholder="Search country"></div>
  <div class="col-md-3"><select class="form-select" id="sport"><option value="">All sports</option></select></div>
  <div class="col-md-3"><select class="form-select" id="sort">
    <option value="total">Sort: Total</option><option value="gold">Sort: Gold</option>
    <option value="silver">Sort: Silver</option><option value="bronze">Sort: Bronze</option>
  </select></div>
</div></div>
<div class="card"><div class="table-responsive"><table class="table table-hover mb-0">
  <thead><tr><th>#</th><th>Country</th><th>Gold</th><th>Silver</th><th>Bronze</th><th>Total</th></tr></thead>
  <tbody id="rows"><tr><td colspan="6" class="text-center muted py-4">Loading…</td></tr></tbody>
</table></div>
<div class="d-flex justify-content-between align-items-center p-3">
  <span class="muted" id="info"></span>
  <div><button class="btn btn-sm btn-outline-light" id="prev">‹ Prev</button>
       <button class="btn btn-sm btn-outline-light" id="next">Next ›</button></div>
</div></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
requireAuth(); mountNav("standings.html");
let page = 1;
async function init(){
  const [yrs, sps] = await Promise.all([api("/olympics"), api("/sports")]);
  const ySel = document.getElementById("year");
  yrs.forEach(y => ySel.insertAdjacentHTML("beforeend", `<option>${y.year}</option>`));
  const sSel = document.getElementById("sport");
  sps.forEach(s => sSel.insertAdjacentHTML("beforeend", `<option>${s.name}</option>`));
  ["year","country","sport","sort"].forEach(id=>{
    document.getElementById(id).addEventListener("change",()=>{page=1;load();});
    document.getElementById(id).addEventListener("input",()=>{page=1;load();});
  });
  document.getElementById("prev").onclick=()=>{if(page>1){page--;load();}};
  document.getElementById("next").onclick=()=>{page++;load();};
  document.getElementById("csvBtn").onclick=async ()=>{
    const y = document.getElementById("year").value;
    const r = await fetch(`/api/export/csv${y?`?year=${y}`:""}`,{headers:{Authorization:`Bearer ${getToken()}`}});
    const blob = await r.blob(); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=`olympics_${y||"all"}.csv`; a.click();
  };
  document.getElementById("pdfBtn").onclick=async ()=>{
    const y = document.getElementById("year").value;
    const r = await fetch(`/api/export/pdf${y?`?year=${y}`:""}`,{headers:{Authorization:`Bearer ${getToken()}`}});
    const blob = await r.blob(); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=`olympics_${y||"all"}.pdf`; a.click();
  };
  load();
}
async function load(){
  const params = new URLSearchParams({
    page, per_page:25,
    year: document.getElementById("year").value,
    country: document.getElementById("country").value,
    sport: document.getElementById("sport").value,
    sort: document.getElementById("sort").value,
  });
  try{
    const r = await api("/medals?"+params.toString());
    const tb = document.getElementById("rows");
    if(!r.rows.length){ tb.innerHTML = `<tr><td colspan="6" class="text-center muted py-4">No data</td></tr>`; }
    else tb.innerHTML = r.rows.map(x=>`<tr><td>${x.rank}</td><td>${x.country}</td>
      <td class="medal-gold">${x.gold}</td><td class="medal-silver">${x.silver}</td>
      <td class="medal-bronze">${x.bronze}</td><td><b>${x.total}</b></td></tr>`).join("");
    document.getElementById("info").textContent = `Page ${r.page} · ${r.total} countries`;
  }catch(e){ toast(e.message,"error"); }
}
init();
</script></body></html>
