<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prediction | Olympic Analytics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head><body>
<div id="navbar"></div>
<main class="container-fluid px-4 py-4">
<h2 class="mb-4">Medal Prediction</h2>
<div class="row g-3">
<div class="col-lg-5"><div class="card p-3"><div class="card-header">Athlete & history</div>
<form id="predForm" class="mt-3">
  <div class="mb-2"><label class="form-label">Country</label><select class="form-select" name="country" id="country" required></select></div>
  <div class="mb-2"><label class="form-label">Sport</label><select class="form-select" name="sport" id="sport" required></select></div>
  <div class="row g-2">
    <div class="col-6"><label class="form-label">Athletes</label><input type="number" class="form-control" name="athletes" value="15" min="1" required></div>
    <div class="col-6"><label class="form-label">Participations</label><input type="number" class="form-control" name="participation_count" value="3" min="1" required></div>
    <div class="col-4"><label class="form-label">Prev Gold</label><input type="number" class="form-control" name="prev_gold" value="2" min="0"></div>
    <div class="col-4"><label class="form-label">Prev Silver</label><input type="number" class="form-control" name="prev_silver" value="1" min="0"></div>
    <div class="col-4"><label class="form-label">Prev Bronze</label><input type="number" class="form-control" name="prev_bronze" value="1" min="0"></div>
  </div>
  <button class="btn btn-primary w-100 mt-3" id="predBtn">Predict</button>
</form></div></div>
<div class="col-lg-7"><div class="card p-3"><div class="card-header">Prediction</div>
<div id="result" class="mt-3 muted">Submit the form to see the predicted medal category.</div>
<div class="chart-box mt-3"><canvas id="probChart"></canvas></div>
</div></div></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script src="js/prediction.js"></script>
</body></html>
