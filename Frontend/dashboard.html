<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard | Olympic Analytics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head><body>
<div id="navbar"></div>
<main class="container-fluid px-4 py-4">
<h2 class="mb-4">Overview</h2>
<div class="row g-3 mb-4">
  <div class="col-md-3"><div class="stat-card d-flex justify-content-between"><div><div class="label">Countries</div><div class="value" id="c-countries">—</div></div><div class="icon">🌍</div></div></div>
  <div class="col-md-3"><div class="stat-card d-flex justify-content-between"><div><div class="label">Sports</div><div class="value" id="c-sports">—</div></div><div class="icon">🏟️</div></div></div>
  <div class="col-md-3"><div class="stat-card d-flex justify-content-between"><div><div class="label">Total Medals</div><div class="value" id="c-medals">—</div></div><div class="icon">🏅</div></div></div>
  <div class="col-md-3"><div class="stat-card d-flex justify-content-between"><div><div class="label">Olympic Years</div><div class="value" id="c-years">—</div></div><div class="icon">📅</div></div></div>
</div>
<div class="row g-3">
  <div class="col-lg-5"><div class="card p-3"><div class="card-header pb-2">Medal Distribution</div><div class="chart-box"><canvas id="pie"></canvas></div></div></div>
  <div class="col-lg-7"><div class="card p-3"><div class="card-header pb-2">Top 10 Countries</div><div class="chart-box"><canvas id="bar"></canvas></div></div></div>
  <div class="col-lg-7"><div class="card p-3"><div class="card-header pb-2">Medal Trend by Year</div><div class="chart-box"><canvas id="line"></canvas></div></div></div>
  <div class="col-lg-5"><div class="card p-3"><div class="card-header pb-2">Top Sports by Medals</div><div class="chart-box"><canvas id="sportBar"></canvas></div></div></div>
</div>
</main>
<div class="footer">Olympic Analytics · Powered by Flask + Gemini AI</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body></html>
