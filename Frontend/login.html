<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login | Olympic Analytics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head>
<body><div class="auth-wrap"><div class="auth-card">
<div class="text-center mb-4"><div style="font-size:2.4rem">🏅</div>
<div class="hero-title">Welcome back</div>
<div class="muted">Sign in to access the Olympic Analytics dashboard</div></div>
<form id="loginForm">
  <div class="mb-3"><label class="form-label">Email</label>
  <input type="email" class="form-control" name="email" required></div>
  <div class="mb-3"><label class="form-label">Password</label>
  <input type="password" class="form-control" name="password" required></div>
  <button class="btn btn-primary w-100" id="submitBtn">Sign In</button>
</form>
<div class="text-center mt-3 muted">No account? <a href="register.html">Create one</a></div>
</div></div>
<script src="js/app.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in…';
  try{
    const r = await api("/login",{method:"POST",body:JSON.stringify({
      email: fd.get("email"), password: fd.get("password")
    })});
    setAuth(r.token, r.user); window.location.href="dashboard.html";
  }catch(err){ toast(err.message,"error"); btn.disabled=false; btn.textContent="Sign In"; }
});
</script></body></html>
